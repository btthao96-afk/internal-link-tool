<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hướng dẫn sử dụng — 3 Skill Internal Link</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/languages/json.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #0b1020;
    --card: #11172e;
    --border: #1f2746;
    --text: #e7eaf6;
    --muted: #97a0c5;
    --accent: #6c8cff;
    --accent2: #29d3a3;
    --warn: #f8b94a;
    --bad: #ef5b76;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: linear-gradient(180deg, #060a18 0%, #0b1020 60%, #0a0f1f 100%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
    line-height: 1.65;
  }
  .layout { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; display: grid; grid-template-columns: 240px 1fr; gap: 28px; }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .toc { position: static; max-height: none; } }
  .toc {
    position: sticky; top: 24px; align-self: start;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; font-size: 13px; max-height: calc(100vh - 48px); overflow-y: auto;
  }
  .toc h3 { margin: 0 0 8px; font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.06em; }
  .toc a { display: block; padding: 4px 6px; color: var(--text); text-decoration: none; border-radius: 4px; }
  .toc a:hover { background: #0e1430; color: var(--accent); }
  .toc a.h3 { padding-left: 20px; color: var(--muted); font-size: 12px; }
  .nav { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .nav a {
    text-decoration: none; padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px;
    background: #0e1430; color: var(--text); font-size: 13px;
  }
  .nav a.active { background: var(--accent); color: #050811; border-color: var(--accent); }
  main {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 28px 32px; min-height: 100vh;
  }
  h1 { font-size: 30px; margin: 0 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  h2 { font-size: 22px; color: var(--accent); margin-top: 36px; padding-top: 8px; border-top: 1px solid var(--border); padding-top: 16px; }
  h3 { font-size: 17px; color: var(--accent2); margin-top: 24px; }
  h4 { font-size: 15px; color: var(--text); margin-top: 18px; }
  p { margin: 10px 0; }
  ul, ol { margin: 8px 0; padding-left: 22px; }
  li { margin: 4px 0; }
  code {
    background: #0e1430; border: 1px solid var(--border);
    padding: 1px 6px; border-radius: 4px; font-size: 0.88em;
    font-family: SF Mono, Menlo, Consolas, monospace; color: #c0caea;
  }
  pre {
    background: #060a18 !important; border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 16px; overflow-x: auto; margin: 14px 0; font-size: 13px;
  }
  pre code {
    background: transparent !important; border: 0; padding: 0; color: inherit;
  }
  table { border-collapse: collapse; margin: 14px 0; width: 100%; font-size: 13px; }
  th, td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; vertical-align: top; }
  th { background: #0e1430; color: var(--accent); font-weight: 500; }
  tr:nth-child(even) td { background: #0c1228; }
  blockquote {
    border-left: 3px solid var(--accent); background: #0e1430;
    padding: 8px 14px; margin: 14px 0; border-radius: 0 6px 6px 0; color: var(--muted);
  }
  blockquote strong { color: var(--text); }
  a { color: var(--accent); }
  hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
  .anchor-offset { scroll-margin-top: 20px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
</style>
</head>
<body>
<div class="layout">
  <aside class="toc">
    <div class="nav" style="flex-direction:column">
      <a href="skill-demo.html">🔗 Semantic Linker</a>
      <a href="stats-demo.html">📊 Inlink Stats</a>
      <a href="huong-dan.html" class="active">📘 Hướng dẫn</a>
      <a href="https://github.com/btthao96-afk/internal-link-tool" target="_blank">↗ GitHub</a>
    </div>
    <h3 style="margin-top:16px">Mục lục</h3>
    <nav id="toc-nav"></nav>
  </aside>
  <main>
    <div id="content" class="loading">Đang tải hướng dẫn...</div>
  </main>
</div>

<script>
(async () => {
  const content = document.getElementById('content');
  let md;
  try {
    md = await (await fetch('huong-dan.md')).text();
  } catch (e) {
    content.innerHTML = '<p style="color:#ef5b76">Không tải được huong-dan.md</p>';
    return;
  }

  marked.setOptions({
    gfm: true, breaks: false,
    highlight: (code, lang) => {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, { language: lang }).value;
      }
      return code;
    }
  });

  // Render
  content.classList.remove('loading');
  content.innerHTML = marked.parse(md);

  // Auto-id headings + build TOC
  const tocNav = document.getElementById('toc-nav');
  const slugify = s => s.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/đ/g,'d').replace(/[^a-z0-9\s-]/g,'')
    .trim().replace(/\s+/g,'-');
  const headings = content.querySelectorAll('h2, h3');
  headings.forEach(h => {
    const slug = slugify(h.textContent);
    h.id = slug; h.classList.add('anchor-offset');
    const a = document.createElement('a');
    a.href = '#' + slug; a.textContent = h.textContent;
    if (h.tagName === 'H3') a.classList.add('h3');
    tocNav.appendChild(a);
  });

  // Highlight code blocks
  document.querySelectorAll('pre code').forEach(b => {
    if (!b.classList.contains('hljs')) {
      hljs.highlightElement(b);
    }
  });

  // Open external links new tab
  document.querySelectorAll('main a[href^="http"]').forEach(a => {
    a.target = '_blank'; a.rel = 'noopener';
  });
})();
</script>
</body>
</html>
